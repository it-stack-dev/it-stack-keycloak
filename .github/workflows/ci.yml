name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'bugfix/**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose files
        run: |
          echo "Validating: docker/docker-compose.standalone.yml"
          docker compose -f docker/docker-compose.standalone.yml config -q
          echo "OK: docker/docker-compose.standalone.yml"
          echo "Validating: docker/docker-compose.lan.yml"
          docker compose -f docker/docker-compose.lan.yml config -q
          echo "OK: docker/docker-compose.lan.yml"
          for f in docker/docker-compose.advanced.yml docker/docker-compose.sso.yml; do
            echo "Checking scaffold: $f"
            docker compose -f "$f" config --no-interpolate -q 2>&1 && echo "OK: $f" \
              || echo "WARN: $f has placeholder variables (scaffold — not yet built out)"
          done
          echo "Validating: docker/docker-compose.integration.yml"
          docker compose -f docker/docker-compose.integration.yml config -q
          echo "OK: docker/docker-compose.integration.yml"
          echo "Validating: docker/docker-compose.production.yml"
          docker compose -f docker/docker-compose.production.yml config -q
          echo "OK: docker/docker-compose.production.yml"

      - name: ShellCheck — lab test scripts
        run: |
          sudo apt-get install -y shellcheck -qq
          shellcheck --severity=error tests/labs/*.sh

      - name: Validate module manifest
        run: |
          python3 -c "
          import sys, re
          with open('it-stack-keycloak.yml') as f:
              content = f.read()
          required = ['module:', 'version:', 'phase:', 'category:', 'ports:']
          missing = [k for k in required if k not in content]
          if missing:
              print('Missing fields:', missing); sys.exit(1)
          print('Manifest valid')
          "

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — scan Dockerfile
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Trivy — SARIF output
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  lab-01-smoke:
    name: Lab 01 — Smoke Test
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true   # scaffold stubs; full lab runs on real VMs
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y netcat-openbsd

      - name: Start standalone stack
        run: docker compose -f docker/docker-compose.standalone.yml up -d

      - name: Wait for Keycloak to be ready
        run: |
          echo "Waiting for Keycloak (start-dev mode takes ~90 seconds)..."
          timeout 180 bash -c '
            until curl -sf http://localhost:8080/health/ready > /dev/null 2>&1; do
              sleep 5
            done'
          echo "Keycloak is ready"
          docker compose -f docker/docker-compose.standalone.yml ps

      - name: Run Lab 02-01 test script
        run: bash tests/labs/test-lab-02-01.sh

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.standalone.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.standalone.yml down -v

  lab-02-smoke:
    name: Lab 02 — PostgreSQL Persistence
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y netcat-openbsd curl

      - name: Start LAN stack (keycloak + postgres)
        run: docker compose -f docker/docker-compose.lan.yml up -d

      - name: Wait for Keycloak health
        run: |
          timeout 200 bash -c '
            until curl -sf http://localhost:8080/health/ready; do
              sleep 5
            done'
          echo "Keycloak is ready"

      - name: Run Lab 02-02 test script
        env:
          KC_PASS: "Lab02Password!"
        run: bash tests/labs/test-lab-02-02.sh

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.lan.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.lan.yml down -v

  lab-03-smoke:
    name: Lab 03 — Keycloak Cluster + MailHog
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y netcat-openbsd curl

      - name: Start advanced stack (2 nodes + postgres + mailhog)
        run: docker compose -f docker/docker-compose.advanced.yml up -d

      - name: Wait for Keycloak node 1
        run: timeout 200 bash -c 'until curl -sf http://localhost:8080/health/ready; do sleep 5; done'

      - name: Wait for Keycloak node 2
        run: timeout 200 bash -c 'until curl -sf http://localhost:8081/health/ready; do sleep 5; done'

      - name: Run Lab 02-03 test script
        env:
          KC_PASS: "Lab03Password!"
        run: bash tests/labs/test-lab-02-03.sh

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.advanced.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.advanced.yml down -v

  lab-04-smoke:
    name: Lab 04 — Full OIDC/SAML Hub (ROPC, refresh, introspection, SAML)
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y netcat-openbsd curl

      - name: Start SSO stack (keycloak + db + oidc-test-app + mailhog)
        run: docker compose -f docker/docker-compose.sso.yml up -d

      - name: Wait for Keycloak
        run: timeout 200 bash -c 'until curl -sf http://localhost:8080/health/ready | grep -q UP; do sleep 5; done'

      - name: Run Lab 02-04 test script
        env:
          KC_PASS: "Lab04Password!"
        run: bash tests/labs/test-lab-02-04.sh

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.sso.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.sso.yml down -v

  lab-05-smoke:
    name: "Lab 05 — INT-01 FreeIPA LDAP federation + OIDC clients + MailHog"
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y curl netcat-openbsd ldap-utils python3

      - name: Start integration stack
        run: docker compose -f docker/docker-compose.integration.yml up -d

      - name: Wait for OpenLDAP + ldap-seed to complete
        # Keycloak depends_on ldap-seed (service_completed_successfully)
        # which in turn depends on openldap (healthy). Waiting for port 389
        # first speeds up Keycloak's own readiness check below.
        run: timeout 90 bash -c 'until nc -z localhost 389; do sleep 3; done'

      - name: Wait for Keycloak (includes ldap-seed completion)
        run: timeout 240 bash -c 'until curl -sf http://localhost:8080/health/ready | grep -q UP; do sleep 5; done'

      - name: Run Lab 02-05 test script
        env:
          KC_PASS: "Lab05Password!"
        run: bash tests/labs/test-lab-02-05.sh

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.integration.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.integration.yml down -v

  lab-06-smoke:
    name: Lab 06 — Keycloak Production HA (2-node cluster, Traefik LB, PG, Redis)
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y curl

      - name: Start production stack
        run: docker compose -f docker/docker-compose.production.yml up -d

      - name: Wait for Keycloak cluster (both nodes via Traefik)
        run: timeout 300 bash -c 'until curl -sf http://localhost:8080/health/ready | grep -q UP; do sleep 5; done'

      - name: Run Lab 02-06 test script
        env:
          KC_PASS: "Lab06Password!"
        run: bash tests/labs/test-lab-02-06.sh

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.production.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.production.yml down -v